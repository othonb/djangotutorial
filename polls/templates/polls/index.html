{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Polls</title>

    <!-- Bootstrap 5 (CDN) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
          <a class="navbar-brand" href="">Polls</a>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="d-flex align-items-center justify-content-between mb-3">
            <h1 class="h3 mb-0">Latest questions</h1>
          </div>

          {% if latest_question_list %}
            <div class="list-group shadow-sm">
              {% for question in latest_question_list %}
                <a
                  class="list-group-item list-group-item-action d-flex justify-content-between align-items-start"
                  href="{{ question.id }}"
                >
                  <div class="me-auto">
                    <div class="fw-semibold">{{ question.question_text }}</div>
                    <small class="text-muted">
                      Published: {{ question.pub_date|date:"M j, Y, P" }}
                    </small>
                  </div>
                  <span class="badge text-bg-primary rounded-pill">Vote</span>
                </a>
              {% endfor %}
            </div>
          {% else %}
            <div class="alert alert-warning shadow-sm" role="alert">
              No polls are available.
            </div>
          {% endif %}
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
